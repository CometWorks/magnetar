name: Upload MagnetarMod to Steam Workshop

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      changenote:
        description: "Steam Workshop change note"
        required: false
        default: "Manual GitHub Actions upload"
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          [ -n "${{ secrets.STEAM_USERNAME }}" ] || { echo "Missing secret: STEAM_USERNAME"; exit 1; }
          [ -n "${STEAM_CONFIG_VDF:-}" ] || { echo "Missing secret: STEAM_CONFIG_VDF"; exit 1; }
          echo "::add-mask::$STEAM_CONFIG_VDF"
          echo "Using cached SteamCMD host config authentication for workshop upload."

      - name: Build upload content
        run: |
          set -euo pipefail

          STAGING="${RUNNER_TEMP}/MagnetarMod-upload"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          rsync -a --delete \
            --exclude 'README.md' \
            --exclude 'MagnetarMod.csproj' \
            --exclude '*.mdk.local.ini' \
            --exclude 'bin/' \
            --exclude 'obj/' \
            MagnetarMod/ "$STAGING/"

          SBMI_FILE="MagnetarMod/modinfo.sbmi"
          if [ ! -f "$SBMI_FILE" ]; then
            echo "Expected metadata file not found: $SBMI_FILE"
            exit 1
          fi

          WORKSHOP_ID="$(SBMI_FILE="$SBMI_FILE" python3 -c 'import xml.etree.ElementTree as ET, os; root = ET.parse(os.environ["SBMI_FILE"]).getroot(); ids = root.findall(".//WorkshopIds/WorkshopId/Id"); print(((ids[0].text or "").strip()) if ids else "")')"

          if ! printf '%s' "$WORKSHOP_ID" | grep -Eq '^[1-9][0-9]*$'; then
            echo "Unable to resolve a valid Workshop ID from $SBMI_FILE"
            exit 1
          fi

          echo "WORKSHOP_ID=$WORKSHOP_ID" >> "$GITHUB_ENV"
          echo "STAGING_DIR=$STAGING" >> "$GITHUB_ENV"
          echo "Prepared MagnetarMod upload staging at $STAGING with Workshop ID $WORKSHOP_ID"

      - name: Setup SteamCMD
        uses: andriivitiv/setup-steamcmd@v1.2.0

      - name: Create SteamCMD upload script
        env:
          CHANGE_NOTE: ${{ github.event.inputs.changenote }}
        run: |
          set -euo pipefail

          {
            SAFE_CHANGE_NOTE="${CHANGE_NOTE//$'\n'/ }"
            SAFE_CHANGE_NOTE="${SAFE_CHANGE_NOTE//\"/\'}"

            echo '"workshopitem"'
            echo '{'
            echo '  "appid" "244850"'
            echo "  \"publishedfileid\" \"${WORKSHOP_ID}\""
            echo "  \"contentfolder\" \"${STAGING_DIR}\""
            echo "  \"changenote\" \"${SAFE_CHANGE_NOTE}\""
            echo '}'
          } > "$RUNNER_TEMP/workshop_item.vdf"

      - name: Install SteamCMD cached credentials config
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          set -euo pipefail
          echo "::add-mask::$STEAM_CONFIG_VDF"

          mkdir -p "$HOME/Steam/config"
          printf '%s' "$STEAM_CONFIG_VDF" > "$HOME/Steam/config/config.vdf"
          chmod 600 "$HOME/Steam/config/config.vdf"
          echo "Wrote Steam cached credentials config to: $HOME/Steam/config/config.vdf"

      - name: Upload to Steam Workshop item
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          set -euo pipefail
          steamcmd +login "$STEAM_USERNAME" +workshop_build_item "$RUNNER_TEMP/workshop_item.vdf" +quit
